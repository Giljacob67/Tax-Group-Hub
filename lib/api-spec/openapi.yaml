openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Tax Group AI Hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: agents
    description: AI Agents
  - name: conversations
    description: Chat conversations and messages
  - name: knowledge
    description: Knowledge base management
  - name: integrations
    description: External integrations (image generation, Canva, embeddings)
  - name: settings
    description: Platform settings and integration status
  - name: llm
    description: LLM connections, providers and profiles
  - name: crm
    description: CRM contacts, deals, tasks, views, pipelines, automations
  - name: deliverables
    description: AI-generated deliverables (proposals, diagnostics, summaries)
  - name: analytics
    description: Usage analytics and cost tracking
  - name: automate
    description: Automation sequences, enrollments and broadcasts
  - name: ai-quality
    description: AI quality testing, runs and feedback
  - name: branding
    description: Tenant branding and customization
  - name: orchestrate
    description: Multi-agent orchestration

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all AI agents
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Agent"
                required: [agents]

  /agents/{agentId}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get agent details
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List conversations
      parameters:
        - name: agentId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Conversation"
                required: [conversations]
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationRequest"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /messages/{messageId}:
    delete:
      summary: Delete a single message
      operationId: deleteMessage
      tags: [conversations]
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Message deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /conversations/{conversationId}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get conversation with messages
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: renameConversation
      tags: [conversations]
      summary: Rename a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameConversationRequest"
      responses:
        "200":
          description: Conversation renamed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenameConversationResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteConversation
      tags: [conversations]
      summary: Delete a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /conversations/{conversationId}/messages:
    post:
      operationId: sendMessage
      tags: [conversations]
      summary: Send a message and get AI response
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /conversations/{conversationId}/export:
    get:
      operationId: exportConversation
      tags: [conversations]
      summary: Export conversation as Markdown
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Markdown file
          content:
            text/markdown:
              schema:
                type: string
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /knowledge:
    get:
      operationId: listKnowledgeDocuments
      tags: [knowledge]
      summary: List knowledge base documents
      parameters:
        - name: agentId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/KnowledgeDocument"
                required: [documents]

  /knowledge/upload:
    post:
      operationId: uploadKnowledgeDocument
      tags: [knowledge]
      summary: Upload a knowledge document with text extraction
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                agentId:
                  type: string
              required: [file, agentId]
      responses:
        "201":
          description: Document uploaded and processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeDocument"

  /knowledge/upload-url:
    post:
      operationId: requestUploadUrl
      tags: [knowledge]
      summary: Request a presigned upload URL for knowledge base document (legacy)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /knowledge/{documentId}:
    delete:
      operationId: deleteKnowledgeDocument
      tags: [knowledge]
      summary: Delete a knowledge document
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /knowledge/health:
    get:
      operationId: getKnowledgeHealth
      tags: [knowledge]
      summary: Knowledge base health stats
      responses:
        "200":
          description: Health stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeHealthResponse"

  /knowledge/sources:
    get:
      operationId: getKnowledgeSources
      tags: [knowledge]
      summary: List knowledge sources with stats
      responses:
        "200":
          description: Sources list
          content:
            application/json:
              schema:
                type: object
                properties:
                  sources:
                    type: array
                    items:
                      $ref: "#/components/schemas/KnowledgeSource"
                required: [sources]

  /knowledge/search:
    post:
      operationId: searchKnowledgeDedicated
      tags: [knowledge]
      summary: Semantic search in knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchKnowledgeRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchKnowledgeResponse"

  /knowledge/{documentId}/chunks:
    get:
      operationId: getDocumentChunks
      tags: [knowledge]
      summary: Get chunks for a knowledge document
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Document chunks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentChunksResponse"

  /knowledge/{documentId}/reindex:
    post:
      operationId: reindexDocument
      tags: [knowledge]
      summary: Reindex a knowledge document
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reindex started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /integrations/generate-image:
    post:
      operationId: generateImage
      tags: [integrations]
      summary: Generate an image using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateImageRequest"
      responses:
        "200":
          description: Generated image URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateImageResponse"

  /integrations/image-gallery/{agentId}:
    get:
      operationId: getImageGallery
      tags: [integrations]
      summary: Get generated images for an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image gallery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageGalleryResponse"

  /integrations/canva-link:
    post:
      operationId: getCanvaLink
      tags: [integrations]
      summary: Generate a Canva deep link for editing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CanvaLinkRequest"
      responses:
        "200":
          description: Canva deep link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvaLinkResponse"

  /integrations/search-knowledge:
    post:
      operationId: searchKnowledge
      tags: [integrations]
      summary: Semantic search in knowledge base using embeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchKnowledgeRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchKnowledgeResponse"

  /settings/models:
    get:
      operationId: getAvailableModels
      tags: [settings]
      summary: Get curated list of available OpenRouter models
      responses:
        "200":
          description: Available models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableModelsResponse"

  /settings/integrations:
    get:
      operationId: getIntegrationSettings
      tags: [settings]
      summary: Get status of all platform integrations
      responses:
        "200":
          description: Integration settings and status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationSettingsResponse"

  /settings/keys:
    get:
      operationId: getCustomKeys
      tags: [settings]
      summary: Get custom BYOK API keys
      responses:
        "200":
          description: Custom keys list
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: "#/components/schemas/CustomKey"
                required: [keys]
    post:
      operationId: setCustomKey
      tags: [settings]
      summary: Set a custom BYOK API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCustomKeyRequest"
      responses:
        "200":
          description: Key set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings/keys/{provider}:
    delete:
      operationId: deleteCustomKey
      tags: [settings]
      summary: Delete a custom BYOK API key
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /settings/channels:
    get:
      operationId: listChannels
      tags: [settings]
      summary: List omnichannel channels
      responses:
        "200":
          description: Channel list
          content:
            application/json:
              schema:
                type: object
                properties:
                  channels:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChannelConfig"
                required: [channels]
    post:
      operationId: createChannel
      tags: [settings]
      summary: Create an omnichannel channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelRequest"
      responses:
        "201":
          description: Channel created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  channel:
                    $ref: "#/components/schemas/ChannelConfig"
                required: [success, channel]

  /settings/channels/{id}:
    delete:
      operationId: deleteChannel
      tags: [settings]
      summary: Delete an omnichannel channel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /llm/providers:
    get:
      operationId: listLlmProviders
      tags: [llm]
      summary: List available LLM providers
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/LlmProvider"
                required: [providers]

  /llm/connections:
    get:
      operationId: listLlmConnections
      tags: [llm]
      summary: List LLM connections
      responses:
        "200":
          description: Connection list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connections:
                    type: array
                    items:
                      $ref: "#/components/schemas/LlmConnection"
                required: [success, connections]
    post:
      operationId: createLlmConnection
      tags: [llm]
      summary: Create an LLM connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLlmConnectionRequest"
      responses:
        "201":
          description: Connection created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connection:
                    $ref: "#/components/schemas/LlmConnection"
                required: [success, connection]

  /llm/connections/{id}:
    put:
      operationId: updateLlmConnection
      tags: [llm]
      summary: Update an LLM connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLlmConnectionRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connection:
                    $ref: "#/components/schemas/LlmConnection"
                required: [success, connection]
    delete:
      operationId: deleteLlmConnection
      tags: [llm]
      summary: Delete an LLM connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /llm/connections/{id}/test:
    post:
      operationId: testLlmConnection
      tags: [llm]
      summary: Test an LLM connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmTestResult"

  /llm/connections/{id}/activate:
    post:
      operationId: activateLlmConnection
      tags: [llm]
      summary: Activate an LLM connection as default
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  connectionId:
                    type: integer
                  usageType:
                    type: string
                required: [success, connectionId, usageType]

  /llm/validate:
    post:
      operationId: validateLlmCredentials
      tags: [llm]
      summary: Validate LLM API credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateLlmRequest"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmTestResult"

  /llm/discover:
    post:
      operationId: discoverLlmModels
      tags: [llm]
      summary: Discover available models for a provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                apiKey:
                  type: string
                baseUrl:
                  type: string
              required: [provider, apiKey]
      responses:
        "200":
          description: Discovered models
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /llm/health-check:
    post:
      operationId: llmHealthCheck
      tags: [llm]
      summary: Run health check on all connections
      responses:
        "200":
          description: Health check results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  results:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                required: [success, results]

  /llm/profiles:
    get:
      operationId: listLlmProfiles
      tags: [llm]
      summary: List LLM profiles
      responses:
        "200":
          description: Profile list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  profiles:
                    type: array
                    items:
                      $ref: "#/components/schemas/LlmProfile"
                required: [success, profiles]
    post:
      operationId: createLlmProfile
      tags: [llm]
      summary: Create an LLM profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLlmProfileRequest"
      responses:
        "201":
          description: Profile created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  profile:
                    $ref: "#/components/schemas/LlmProfile"
                required: [success, profile]

  /llm/profiles/{id}:
    put:
      operationId: updateLlmProfile
      tags: [llm]
      summary: Update an LLM profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLlmProfileRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  profile:
                    $ref: "#/components/schemas/LlmProfile"
                required: [success, profile]
    delete:
      operationId: deleteLlmProfile
      tags: [llm]
      summary: Delete an LLM profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /llm/profiles/{id}/activate:
    post:
      operationId: activateLlmProfile
      tags: [llm]
      summary: Activate an LLM profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  profileId:
                    type: integer
                required: [success, profileId]

  /crm/contacts:
    get:
      operationId: listCrmContacts
      tags: [crm]
      summary: List CRM contacts
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: tag
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [razaoSocial, aiScore, status, createdAt]
        - name: sortDir
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Contact list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  contacts:
                    type: array
                    items:
                      $ref: "#/components/schemas/CrmContact"
                  total:
                    type: integer
                required: [success, contacts, total]
    post:
      operationId: createCrmContact
      tags: [crm]
      summary: Create a CRM contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCrmContactRequest"
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  contact:
                    $ref: "#/components/schemas/CrmContact"
                required: [success, contact]

  /crm/contacts/{id}:
    get:
      operationId: getCrmContact
      tags: [crm]
      summary: Get a CRM contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  contact:
                    $ref: "#/components/schemas/CrmContact"
                required: [success, contact]
    put:
      operationId: updateCrmContact
      tags: [crm]
      summary: Update a CRM contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCrmContactRequest"
      responses:
        "200":
