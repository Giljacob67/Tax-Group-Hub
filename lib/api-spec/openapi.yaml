openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Tax Group AI Hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: agents
    description: AI Agents
  - name: conversations
    description: Chat conversations and messages
  - name: knowledge
    description: Knowledge base management
  - name: integrations
    description: External integrations (image generation, Canva, embeddings)
  - name: settings
    description: Platform settings and integration status

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all AI agents
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Agent"
                required: [agents]

  /agents/{agentId}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get agent details
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List conversations
      parameters:
        - name: agentId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Conversation"
                required: [conversations]
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationRequest"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /messages/{messageId}:
    delete:
      summary: Delete a single message
      operationId: deleteMessage
      tags: [conversations]
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Message deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /conversations/{conversationId}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get conversation with messages
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: renameConversation
      tags: [conversations]
      summary: Rename a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameConversationRequest"
      responses:
        "200":
          description: Conversation renamed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenameConversationResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteConversation
      tags: [conversations]
      summary: Delete a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /conversations/{conversationId}/messages:
    post:
      operationId: sendMessage
      tags: [conversations]
      summary: Send a message and get AI response
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /conversations/{conversationId}/export:
    get:
      operationId: exportConversation
      tags: [conversations]
      summary: Export conversation as Markdown
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Markdown file
          content:
            text/markdown:
              schema:
                type: string
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /knowledge:
    get:
      operationId: listKnowledgeDocuments
      tags: [knowledge]
      summary: List knowledge base documents
      parameters:
        - name: agentId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/KnowledgeDocument"
                required: [documents]

  /knowledge/upload:
    post:
      operationId: uploadKnowledgeDocument
      tags: [knowledge]
      summary: Upload a knowledge document with text extraction
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                agentId:
                  type: string
              required: [file, agentId]
      responses:
        "202":
          description: Document accepted and queued for background processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeUploadResponse"

  /knowledge/upload-url:
    post:
      operationId: requestUploadUrl
      tags: [knowledge]
      summary: Request a presigned upload URL for knowledge base document (legacy)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /knowledge/{documentId}:
    delete:
      operationId: deleteKnowledgeDocument
      tags: [knowledge]
      summary: Delete a knowledge document
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /integrations/generate-image:
    post:
      operationId: generateImage
      tags: [integrations]
      summary: Generate an image using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateImageRequest"
      responses:
        "200":
          description: Generated image URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateImageResponse"

  /integrations/image-gallery/{agentId}:
    get:
      operationId: getImageGallery
      tags: [integrations]
      summary: Get generated images for an agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image gallery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageGalleryResponse"

  /integrations/canva-link:
    post:
      operationId: getCanvaLink
      tags: [integrations]
      summary: Generate a Canva deep link for editing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CanvaLinkRequest"
      responses:
        "200":
          description: Canva deep link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvaLinkResponse"

  /integrations/search-knowledge:
    post:
      operationId: searchKnowledge
      tags: [integrations]
      summary: Semantic search in knowledge base using embeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchKnowledgeRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchKnowledgeResponse"

  /settings/models:
    get:
      operationId: getAvailableModels
      tags: [settings]
      summary: Get curated list of available OpenRouter models
      responses:
        "200":
          description: Available models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableModelsResponse"

  /settings/integrations:
    get:
      operationId: getIntegrationSettings
      tags: [settings]
      summary: Get status of all platform integrations
      responses:
        "200":
          description: Integration settings and status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationSettingsResponse"

  /settings/active-provider:
    get:
      operationId: getActiveProvider
      tags: [settings]
      summary: Get the tenant-scoped active LLM provider
      responses:
        "200":
          description: Active provider preference
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveProviderResponse"
    put:
      operationId: setActiveProvider
      tags: [settings]
      summary: Set the tenant-scoped active LLM provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetActiveProviderRequest"
      responses:
        "200":
          description: Active provider saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveProviderSaveResponse"

  /settings/active-provider/test:
    post:
      operationId: testActiveProvider
      tags: [settings]
      summary: Test an LLM provider without changing the saved preference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestActiveProviderRequest"
      responses:
        "200":
          description: Provider test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestActiveProviderResponse"

  /settings/keys:
    get:
      operationId: getCustomKeys
      tags: [settings]
      summary: Get custom BYOK API keys
      responses:
        "200":
          description: Custom keys list
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: "#/components/schemas/CustomKey"
                required: [keys]
    post:
      operationId: setCustomKey
      tags: [settings]
      summary: Set a custom BYOK API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCustomKeyRequest"
      responses:
        "200":
          description: Key set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings/keys/{provider}:
    delete:
      operationId: deleteCustomKey
      tags: [settings]
      summary: Delete a custom BYOK API key
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        block:
          type: string
          enum: [estrategia, prospeccao, marketing, gestao]
        blockLabel:
          type: string
        icon:
          type: string
        systemPrompt:
          type: string
        suggestedPrompts:
          type: array
          items:
            type: string
        priority:
          type: integer
        color:
          type: string
        designStudio:
          type: boolean
      required: [id, name, slug, description, block, blockLabel, icon, systemPrompt, suggestedPrompts, priority, color]

    Conversation:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        messageCount:
          type: integer
      required: [id, agentId, title, createdAt, updatedAt, messageCount]

    Message:
      type: object
      properties:
        id:
          type: string
        conversationId:
          type: string
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
      required: [id, conversationId, role, content, createdAt]

    ConversationWithMessages:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        model:
          type: string
        provider:
          type: string
        agentName:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
      required: [id, agentId, title, createdAt, updatedAt, messages, model, provider, agentName]

    CreateConversationRequest:
      type: object
      properties:
        agentId:
          type: string
        title:
          type: string
        model:
          type: string
      required: [agentId]

    RenameConversationRequest:
      type: object
      properties:
        title:
          type: string
      required: [title]

    RenameConversationResponse:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        title:
          type: string
        updatedAt:
          type: string
          format: date-time
      required: [id, agentId, title, updatedAt]

    SendMessageRequest:
      type: object
      properties:
        content:
          type: string
        useKnowledgeBase:
          type: boolean
        customSystemPrompt:
          type: string
        model:
          type: string
        stream:
          type: boolean
      required: [content]

    MessageResponse:
      type: object
      properties:
        userMessage:
          $ref: "#/components/schemas/Message"
        assistantMessage:
          $ref: "#/components/schemas/Message"
        autoTitle:
          type: string
          nullable: true
        model:
          type: string
        provider:
          type: string
      required: [userMessage, assistantMessage, model, provider]

    KnowledgeDocument:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        filename:
          type: string
        fileType:
          type: string
        fileSize:
          type: integer
        storageKey:
          type: string
        status:
          type: string
          enum: [pending, processing, processed, error]
        hasContent:
          type: boolean
        processed:
          type: boolean
        jobId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, agentId, filename, fileType, fileSize, storageKey, status, createdAt]

    KnowledgeUploadResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        document:
          $ref: "#/components/schemas/KnowledgeDocument"
      required: [success, message, document]

    UploadUrlRequest:
      type: object
      properties:
        agentId:
          type: string
        filename:
          type: string
        fileType:
          type: string
        fileSize:
          type: integer
      required: [agentId, filename, fileType, fileSize]

    UploadUrlResponse:
      type: object
      properties:
        uploadUrl:
          type: string
        documentId:
          type: string
        storageKey:
          type: string
      required: [uploadUrl, documentId, storageKey]

    GenerateImageRequest:
      type: object
      properties:
        prompt:
          type: string
        style:
          type: string
        agentId:
          type: string
      required: [prompt]

    GalleryImage:
      type: object
      properties:
        url:
          type: string
        prompt:
          type: string
        createdAt:
          type: string
      required: [url, prompt, createdAt]

    GenerateImageResponse:
      type: object
      properties:
        imageUrl:
          type: string
        prompt:
          type: string
        gallery:
          type: array
          items:
            $ref: "#/components/schemas/GalleryImage"
      required: [imageUrl, prompt]

    ImageGalleryResponse:
      type: object
      properties:
        images:
          type: array
          items:
            $ref: "#/components/schemas/GalleryImage"
      required: [images]

    CanvaLinkRequest:
      type: object
      properties:
        contentType:
          type: string
        title:
          type: string
        description:
          type: string
      required: [contentType]

    CanvaLinkResponse:
      type: object
      properties:
        url:
          type: string
        contentType:
          type: string
        label:
          type: string
      required: [url, contentType]

    SearchKnowledgeRequest:
      type: object
      properties:
        query:
          type: string
        agentId:
          type: string
        limit:
          type: integer
      required: [query]

    SearchKnowledgeResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              documentId:
                type: string
              filename:
                type: string
              content:
                type: string
              score:
                type: number
            required: [documentId, filename, content, score]
        query:
          type: string
      required: [results, query]

    IntegrationItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        envVar:
          type: string
        configured:
          type: boolean
        active:
          type: boolean
        category:
          type: string
      required: [id, name, description, envVar, configured, active, category]

    IntegrationSettingsResponse:
      type: object
      properties:
        integrations:
          type: array
          items:
            $ref: "#/components/schemas/IntegrationItem"
        activeLLM:
          type: string
          nullable: true
        ollamaModel:
          type: string
        openrouterModel:
          type: string
        activeProvider:
          type: string
        activeModel:
          type: string
          nullable: true
      required: [integrations, ollamaModel, openrouterModel]

    ActiveProviderResponse:
      type: object
      properties:
        provider:
          type: string
        customUrl:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        source:
          type: string
          enum: [tenant, legacy, default]
      required: [provider, customUrl, model, source]

    SetActiveProviderRequest:
      type: object
      properties:
        provider:
          type: string
        customUrl:
          type: string
        model:
          type: string
      required: [provider]

    ActiveProviderSaveResponse:
      allOf:
        - $ref: "#/components/schemas/ActiveProviderResponse"
        - type: object
          properties:
            success:
              type: boolean
          required: [success]

    TestActiveProviderRequest:
      type: object
      properties:
        provider:
          type: string
        customUrl:
          type: string
        model:
          type: string

    TestActiveProviderResponse:
      type: object
      properties:
        success:
          type: boolean
        response:
          type: string
        provider:
          type: string
        model:
          type: string
        tokensUsed:
          type: integer
        executionTimeMs:
          type: integer
        error:
          type: string
      required: [success]

    ModelOption:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
      required: [id, name, description]

    AvailableModelsResponse:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelOption"
        defaultModel:
          type: string
        provider:
          type: string
          nullable: true
      required: [models, defaultModel]

    CustomKey:
      type: object
      properties:
        provider:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        keyLast4:
          type: string
          nullable: true
      required: [provider, createdAt]

    SetCustomKeyRequest:
      type: object
      properties:
        provider:
          type: string
        key:
          type: string
      required: [provider, key]
