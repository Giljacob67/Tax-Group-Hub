components:
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        block:
          type: string
          enum: [estrategia, prospeccao, marketing, gestao]
        blockLabel:
          type: string
        icon:
          type: string
        systemPrompt:
          type: string
        suggestedPrompts:
          type: array
          items:
            type: string
        priority:
          type: integer
        color:
          type: string
        designStudio:
          type: boolean
      required: [id, name, slug, description, block, blockLabel, icon, systemPrompt, suggestedPrompts, priority, color]

    Conversation:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        title:
          type: string
        model:
          type: string
          nullable: true
        provider:
          type: string
          nullable: true
        connectionId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        messageCount:
          type: integer
      required: [id, agentId, title, createdAt, updatedAt, messageCount]

    Message:
      type: object
      properties:
        id:
          type: string
        conversationId:
          type: string
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
      required: [id, conversationId, role, content, createdAt]

    ConversationWithMessages:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        model:
          type: string
        provider:
          type: string
        connectionId:
          type: integer
          nullable: true
        agentName:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
      required: [id, agentId, title, createdAt, updatedAt, messages, model, provider, agentName]

    CreateConversationRequest:
      type: object
      properties:
        agentId:
          type: string
        title:
          type: string
        model:
          type: string
        provider:
          type: string
          nullable: true
        connectionId:
          type: integer
          nullable: true
      required: [agentId]

    RenameConversationRequest:
      type: object
      properties:
        title:
          type: string
      required: [title]

    RenameConversationResponse:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        title:
          type: string
        updatedAt:
          type: string
          format: date-time
      required: [id, agentId, title, updatedAt]

    SendMessageRequest:
      type: object
      properties:
        content:
          type: string
        useKnowledgeBase:
          type: boolean
        customSystemPrompt:
          type: string
        model:
          type: string
        stream:
          type: boolean
        connectionId:
          type: integer
          nullable: true
      required: [content]

    MessageResponse:
      type: object
      properties:
        userMessage:
          $ref: "#/components/schemas/Message"
        assistantMessage:
          $ref: "#/components/schemas/Message"
        autoTitle:
          type: string
          nullable: true
        model:
          type: string
        provider:
          type: string
      required: [userMessage, assistantMessage, model, provider]

    KnowledgeDocument:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        filename:
          type: string
        fileType:
          type: string
        fileSize:
          type: integer
        storageKey:
          type: string
        status:
          type: string
          enum: [pending, processing, processed, error]
        hasContent:
          type: boolean
        category:
          type: string
          nullable: true
        product:
          type: string
          nullable: true
        origin:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        chunkCount:
          type: integer
        retries:
          type: integer
        errorLog:
          type: string
          nullable: true
        embeddingModel:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, agentId, filename, fileType, fileSize, storageKey, status, createdAt]

    KnowledgeHealthResponse:
      type: object
      properties:
        total:
          type: integer
        indexed:
          type: integer
        pending:
          type: integer
        errors:
          type: integer
        totalChunks:
          type: integer
        lastSync:
          type: string
          nullable: true
        sources:
          type: array
          items:
            type: object
            properties:
              origin:
                type: string
              count:
                type: integer
      required: [total, indexed, pending, errors, totalChunks]

    KnowledgeSource:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        status:
          type: string
        total:
          type: integer
        indexed:
          type: integer
        errors:
          type: integer
      required: [id, label, status, total, indexed, errors]

    DocumentChunksResponse:
      type: object
      properties:
        documentId:
          type: string
        filename:
          type: string
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        chunks:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              index:
                type: integer
              content:
                type: string
              tokens:
                type: integer
              hasEmbedding:
                type: boolean
              createdAt:
                type: string
      required: [documentId, filename, total, page, pageSize, chunks]

    UploadUrlRequest:
      type: object
      properties:
        agentId:
          type: string
        filename:
          type: string
        fileType:
          type: string
        fileSize:
          type: integer
      required: [agentId, filename, fileType, fileSize]

    UploadUrlResponse:
      type: object
      properties:
        uploadUrl:
          type: string
        documentId:
          type: string
        storageKey:
          type: string
      required: [uploadUrl, documentId, storageKey]

    GenerateImageRequest:
      type: object
      properties:
        prompt:
          type: string
        style:
          type: string
        agentId:
          type: string
      required: [prompt]

    GalleryImage:
      type: object
      properties:
        url:
          type: string
        prompt:
          type: string
        createdAt:
          type: string
      required: [url, prompt, createdAt]

    GenerateImageResponse:
      type: object
      properties:
        imageUrl:
          type: string
        prompt:
          type: string
        gallery:
          type: array
          items:
            $ref: "#/components/schemas/GalleryImage"
      required: [imageUrl, prompt]

    ImageGalleryResponse:
      type: object
      properties:
        images:
          type: array
          items:
            $ref: "#/components/schemas/GalleryImage"
      required: [images]

    CanvaLinkRequest:
      type: object
      properties:
        contentType:
          type: string
        title:
          type: string
        description:
          type: string
      required: [contentType]

    CanvaLinkResponse:
      type: object
      properties:
        url:
          type: string
        contentType:
          type: string
        label:
          type: string
      required: [url, contentType]

    SearchKnowledgeRequest:
      type: object
      properties:
        query:
          type: string
        agentId:
          type: string
        limit:
          type: integer
      required: [query]

    SearchKnowledgeResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              documentId:
                type: string
              filename:
                type: string
              content:
                type: string
              score:
                type: number
            required: [documentId, filename, content, score]
        query:
          type: string
      required: [results, query]

    IntegrationItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        envVar:
          type: string
        configured:
          type: boolean
        active:
          type: boolean
        category:
          type: string
      required: [id, name, description, envVar, configured, active, category]

    IntegrationSettingsResponse:
      type: object
      properties:
        integrations:
          type: array
          items:
            $ref: "#/components/schemas/IntegrationItem"
        activeLLM:
          type: string
          nullable: true
        ollamaModel:
          type: string
        openrouterModel:
          type: string
      required: [integrations, ollamaModel, openrouterModel]

    ModelOption:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
      required: [id, name, description]

    AvailableModelsResponse:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelOption"
        defaultModel:
          type: string
        provider:
          type: string
          nullable: true
      required: [models, defaultModel]

    CustomKey:
      type: object
      properties:
        provider:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [provider, createdAt]

    SetCustomKeyRequest:
      type: object
      properties:
        provider:
          type: string
        key:
          type: string
      required: [provider, key]

    ChannelConfig:
      type: object
      properties:
        id:
          type: integer
        platform:
          type: string
        externalId:
          type: string
        agentId:
          type: string
        config:
          type: object
          additionalProperties: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, platform, externalId, agentId, isActive]

    CreateChannelRequest:
      type: object
      properties:
        platform:
          type: string
        externalId:
          type: string
        agentId:
          type: string
        config:
          type: object
          additionalProperties: true
      required: [platform, externalId, agentId]

    LlmProvider:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        label:
          type: string
        icon:
          type: string
        color:
          type: string
        ring:
          type: string
        dot:
          type: string
        supportsDiscovery:
          type: boolean
        needsBaseUrl:
          type: boolean
        baseUrlPlaceholder:
          type: string
